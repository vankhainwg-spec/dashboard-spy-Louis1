<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, sans-serif; width: 280px; padding: 12px; margin: 0; }
    h3 { margin: 0 0 8px; font-size: 14px; color: #222; }
    .status { font-size: 12px; color: #666; margin-bottom: 10px; }
    .row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; border-bottom: 1px solid #eee; }
    button { width: 100%; padding: 8px; margin-top: 8px; border: 0; border-radius: 6px; background: #FF6B35; color: white; font-weight: 600; cursor: pointer; }
    button:hover { background: #e85a24; }
    button:disabled { background: #ccc; }
    .toggle { margin-top: 10px; display: flex; align-items: center; gap: 6px; font-size: 12px; }
  </style>
</head>
<body>
  <h3>📊 Dashboard Spy Louis1</h3>
  <div id="status" class="status">Loading…</div>
  <div id="stats"></div>
  <button id="runBtn">Run now</button>
  <label class="toggle">
    <input type="checkbox" id="autoToggle"> Auto-enabled
  </label>
  <script src="popup.js"></script>
</body>
</html>
